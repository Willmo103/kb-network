name: Test and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Run Python tests
        shell: bash
        run: |
          uv sync --upgrade-package kb-core
          uv run pytest

      - name: Bump version and push release tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Bump project patch version in Python
          uv version --bump patch
          NEW_VERSION=$(uv version --short)
          
          # Bump project patch version in Electron app
          cd desktop
          npm version "$NEW_VERSION" --no-git-tag-version
          cd ..
          
          # Stage and commit version changes
          git add pyproject.toml uv.lock desktop/package.json desktop/package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          
          # Tag the release
          git tag "v$NEW_VERSION"
          
          # Push the commit and the tags back to the active branch
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          git push origin HEAD:$BRANCH_NAME
          git push origin "v$NEW_VERSION"

      - name: Build and Package Electron App
        shell: bash
        run: |
          cd desktop
          npm install
          npm run dist
          cd ..

      - name: Build Python CLI Wheel/sdist
        shell: bash
        run: |
          uv build

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch version to use in release command
          NEW_VERSION=$(uv version --short)
          
          # Create GitHub Release and upload build artifacts (Electron installer and Python wheel/sdist)
          gh release create "v$NEW_VERSION" \
            --title "Release v$NEW_VERSION" \
            --notes "Automated release for version v$NEW_VERSION" \
            desktop/dist/*.exe \
            dist/*.whl \
            dist/*.tar.gz
